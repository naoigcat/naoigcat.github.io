name: Lint markdown files

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          globs: '**/*.md'
          config: '.markdownlint-cli2.jsonc'

  tags-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify tag JSON is up to date
        run: |
          set -euo pipefail
          bash scripts/generate-tags-json.sh
          # git diff ignores untracked files; intent-to-add makes new tag JSON visible.
          git add --intent-to-add assets/tags/
          if ! git diff --exit-code -- assets/tags/; then
            echo "::error::assets/tags/ is out of date. Run: mise run tags"
            git diff --stat -- assets/tags/
            exit 1
          fi
