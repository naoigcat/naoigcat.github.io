---
layout: page
title: Tags
permalink: /tags/
---

<ul class="post-list">
  {%- assign sorted_tags = site.tags | sort -%} {%- for tag in sorted_tags -%}
  {%- assign tag_name = tag[0] -%} {%- assign slug = tag_name | slugify -%}
  <li>
    <a
      class="post-link"
      href="{{ '/tags/' | append: slug | append: '/' | relative_url }}"
    >
      {{ tag_name | escape }}
    </a>
    <span class="post-meta">({{ tag[1].size }})</span>
  </li>
  {%- endfor -%}
</ul>
