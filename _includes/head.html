<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {% if page.path == '404.html' %}404 | {{ site.title | escape }}{% elsif
    page.title %}{{ page.title | strip_html | escape }} | {{ site.title | escape
    }}{% else %}{{ site.title | escape }}{% endif %}
  </title>
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  {%- feed_meta -%} {%- if jekyll.environment == 'production' and
  site.google_analytics -%} {%- include google-analytics.html -%} {%- endif -%}
  {%- if page.sort_demo -%}
  <link
    rel="stylesheet"
    href="{{ '/assets/css/sort-demo.css' | relative_url }}"
  />
  <script src="{{ '/assets/js/sort-demo.js' | relative_url }}"></script>
  {%- endif -%} {%- if page.mermaid -%}
  <script
    src="https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js"
    integrity="sha512-HH52omhHpZF6RfVnGiQwYgYm4H/ya2xsZYLl5xJ4+tLfX+rN4+8zF7V/H/KLeicPrKZYi1g6iBmVkk2AhXTGlg=="
    crossorigin="anonymous"
    defer
  ></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (typeof mermaid === "undefined") return;
      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        flowchart: {
          useMaxWidth: true,
          htmlLabels: true,
        },
      });
      mermaid.run({ querySelector: ".language-mermaid" }).catch(function (err) {
        console.error(err);
      });
    });
  </script>
  {%- endif -%}
</head>
